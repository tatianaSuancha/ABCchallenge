<!--Aqui comienzo la rama-Lizeth-letra-L-P-->

<!-- Con class="card" hago que esta tarjeta use los mismos estilos y
la misma logica que las demas cards del proyecto -->

<!-- Con data-tipo="consonante" clasifico la letra para que
JavaScript pueda mostrarla u ocultarla cuando se use el filtro -->

<!-- Con onclick="voltear(this)" llamo la funcion voltear cuando
el usuario haga clic y envio esta misma card mediante this -->

<!--Aqui comienzo a crear la card correspondiente a la letra L-->
<div class="card" data-tipo="consonante" onclick="voltear(this)">

    <!-- Aqui creo la parte frontal de la card, que sera lo 
     primero que vera el usuario-->
    <div class="card-frente">

        <!-- Aqui muestro la letra L en la parte frontal de la 
         tarjeta-->
        <h1>L</h1>


    </div>

    <!-- Aqui creo la parte posterior de la card que aparecera cuando
     el usuario haga clic en ella-->
    <div class="card-dorso">

        <!-- Aqui agrego una IMG relacionada con la letra L, entonces
         en src="img/lampara.png" debo colocar la direccion de la IMG y
         en alt="Imagen de una lampara" describo la imagen para mejorar 
         la accesibilidad-->
        <img src="img/lampara.png" alt="Imagen de una lampara">

        <!-- Aqui escribo la palabra que representa la letra L-->
        <h3>Lampara</h3>


    </div>

</div>
