<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Abecedario Interactivo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            Abecedario Interactivo
        </div>

        <div class="progress">
            Letras descubiertas:
            <span id="contador">0</span>/26
        </div>
    </nav>

    <div class="filters">
        <button
            class="active"
            onclick="filtrar('todas', this)">
            Todas
        </button>

        <button onclick="filtrar('vocales', this)">
            Vocales
        </button>
    </div>

    <main class="cards">

        <!-- Letras A - F: Tatiana -->


        <!-- Letras G - K: Sneyder -->


        <!-- Letras L - P: Lizeth -->


        <!-- Letras Q - U: Bryan -->


        <!-- Letras V - Z: Jorge -->

        <div
            class="card"
            data-tipo="consonante"
            onclick="voltear(this)">

            <div class="card-inner">

                <div class="card-frente">
                    <h1>V</h1>
                </div>

                <div class="card-dorso">
                    <img
                        src="https://static.vecteezy.com/system/resources/previews/006/655/953/non_2x/cartoon-illustration-cool-cow-vector.jpg"
                        alt="Vaca">

                    <h3>Vaca</h3>
                </div>

            </div>
        </div>

        <div
            class="card"
            data-tipo="consonante"
            onclick="voltear(this)">

            <div class="card-inner">

                <div class="card-frente">
                    <h1>W</h1>
                </div>

                <div class="card-dorso">
                    <img
                        src="https://img.magnific.com/vector-premium/dibujo-waffles-jarabe-jarabe-el_410516-86470.jpg?semt=ais_hybrid&w=740&q=80"

            data-tipo="consonante"
            onclick="voltear(this)">

                </div>

                    <img
                        src="https://img.magnific.com/vector-premium/xilofono-colorido-palos_175250-257.jpg?semt=ais_hybrid&w=740&q=80"
                        alt="Xilófono">

                    <h3>Xilófono</h3>
                </div>

            </div>
        </div>

        <div

                        alt="Yoyó">

                    <h3>Yoyó</h3>
                </div>

            </div>
        </div>

        <div
            class="card"
            data-tipo="consonante"
            onclick="voltear(this)">

            <div class="card-inner">

                <div class="card-frente">

                    <h3>Zapato</h3>
